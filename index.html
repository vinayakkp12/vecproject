<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PredictFC — Football Match Predictor</title>

  <!-- ── Google Fonts ─────────────────────────────────────────── -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>

  <!-- ── React 18 + Babel (CDN — no build step needed) ──────── -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <!-- Babel transforms JSX in the browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- ============================================================
       GLOBAL CSS  (identical to original — zero visual changes)
       ============================================================ -->
  <style>
    /* ── CSS Variables — edit colors, sizes here ── */
    :root {
      --color-bg:           #0a0a0f;
      --color-surface:      #12121a;
      --color-border:       rgba(255,255,255,0.07);
      --color-accent:       #00e5a0;
      --color-accent-dim:   rgba(0,229,160,0.12);
      --color-accent-glow:  rgba(0,229,160,0.35);
      --color-text-primary:   #f0f0f0;
      --color-text-secondary: #8888a0;
      --color-text-muted:     #44445a;
      --font: 'Poppins', sans-serif;
      --section-pad: clamp(4rem, 8vw, 7rem);
      --nav-height:  72px;
      --radius-sm: 8px;
      --radius-md: 16px;
      --radius-lg: 28px;
      --ease: cubic-bezier(.25,.8,.25,1);
      --duration: 0.3s;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font);
      background-color: var(--color-bg);
      color: var(--color-text-primary);
      line-height: 1.6;
      overflow-x: hidden;
      background-image: radial-gradient(circle, rgba(255,255,255,0.035) 1px, transparent 1px);
      background-size: 32px 32px;
    }
    a { text-decoration: none; color: inherit; }
    img { display: block; max-width: 100%; }
    ul { list-style: none; }

    /* ── Utilities ── */
    .container { width: min(1160px, 92vw); margin-inline: auto; }
    .accent { color: var(--color-accent); }
    .glass {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--color-border);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    /* ── Buttons ── */
    .btn-primary {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 14px 32px;
      background: var(--color-accent); color: #0a0a0f;
      font-family: var(--font); font-size: 0.9rem; font-weight: 700;
      letter-spacing: 0.04em; text-transform: uppercase;
      border: none; border-radius: var(--radius-sm); cursor: pointer;
      position: relative; overflow: hidden;
      transition: transform var(--duration) var(--ease), box-shadow var(--duration) var(--ease);
    }
    .btn-primary::after {
      content: ''; position: absolute; inset: 0;
      background: rgba(255,255,255,0.15); opacity: 0;
      transition: opacity var(--duration);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 36px var(--color-accent-glow); }
    .btn-primary:hover::after { opacity: 1; }
    .btn-primary:active { transform: translateY(0); }

    .btn-ghost {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 13px 28px;
      background: transparent; color: var(--color-text-primary);
      font-family: var(--font); font-size: 0.9rem; font-weight: 500;
      letter-spacing: 0.03em;
      border: 1px solid var(--color-border); border-radius: var(--radius-sm); cursor: pointer;
      transition: border-color var(--duration), background var(--duration), color var(--duration);
    }
    .btn-ghost:hover { border-color: var(--color-accent); background: var(--color-accent-dim); color: var(--color-accent); }

    /* ── Nav ── */
    .nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: var(--nav-height);
      background: rgba(10,10,15,0.72); border-bottom: 1px solid var(--color-border);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    }
    .nav__inner { display: flex; align-items: center; justify-content: space-between; height: 100%; }
    .nav__logo { display: flex; align-items: center; gap: 10px; font-size: 1.15rem; font-weight: 800; letter-spacing: -0.02em; }
    .nav__logo-icon {
      width: 34px; height: 34px; background: var(--color-accent); border-radius: 50%;
      display: grid; place-items: center; font-size: 16px;
    }
    .nav__links { display: flex; align-items: center; gap: 2rem; }
    .nav__links a {
      font-size: 0.85rem; font-weight: 500; color: var(--color-text-secondary);
      letter-spacing: 0.03em; transition: color var(--duration); position: relative;
    }
    .nav__links a::after {
      content: ''; position: absolute; bottom: -3px; left: 0;
      width: 0; height: 1.5px; background: var(--color-accent);
      transition: width var(--duration) var(--ease);
    }
    .nav__links a:hover { color: var(--color-text-primary); }
    .nav__links a:hover::after { width: 100%; }
    .nav__cta { display: flex; align-items: center; gap: 12px; }
    .nav__hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 4px; }
    .nav__hamburger span { display: block; width: 24px; height: 2px; background: var(--color-text-primary); border-radius: 2px; }

    /* ── Hero ── */
    .hero {
      min-height: 100svh; display: flex; align-items: center;
      padding-top: var(--nav-height); position: relative; overflow: hidden;
    }
    .hero::before, .hero::after {
      content: ''; position: absolute; border-radius: 50%;
      filter: blur(120px); opacity: 0.28; pointer-events: none;
    }
    .hero::before { width: 600px; height: 600px; top: -100px; left: -200px; background: radial-gradient(circle, #00e5a0 0%, transparent 70%); }
    .hero::after  { width: 500px; height: 500px; bottom: -80px; right: -100px; background: radial-gradient(circle, #0070ff 0%, transparent 70%); opacity: 0.18; }
    .hero__grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: center; padding-block: var(--section-pad); position: relative; z-index: 1; }
    .hero__badge {
      display: inline-flex; align-items: center; gap: 8px; padding: 6px 14px;
      border-radius: 999px; background: var(--color-accent-dim); border: 1px solid rgba(0,229,160,0.22);
      font-size: 0.75rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--color-accent); margin-bottom: 1.5rem;
    }
    .hero__badge-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--color-accent); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(1.5)} }
    .hero__heading { font-size: clamp(2.6rem, 5.5vw, 4.2rem); font-weight: 900; line-height: 1.08; letter-spacing: -0.03em; margin-bottom: 1.4rem; }
    .hero__sub { font-size: clamp(0.95rem, 1.8vw, 1.1rem); color: var(--color-text-secondary); font-weight: 400; max-width: 44ch; margin-bottom: 2.5rem; line-height: 1.75; }
    .hero__actions { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
    .hero__social-proof { margin-top: 3rem; display: flex; align-items: center; gap: 16px; }
    .hero__avatars { display: flex; }
    .hero__avatar {
      width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--color-bg);
      margin-left: -10px; font-size: 0.7rem; font-weight: 700; display: grid; place-items: center;
    }
    .hero__avatar:first-child { margin-left: 0; }
    .hero__avatar:nth-child(1){background:#2d6a4f} .hero__avatar:nth-child(2){background:#1d3557}
    .hero__avatar:nth-child(3){background:#6a2d55} .hero__avatar:nth-child(4){background:#5a4d2d}
    .hero__proof-text { font-size: 0.8rem; color: var(--color-text-secondary); line-height: 1.4; }
    .hero__proof-text strong { color: var(--color-text-primary); font-weight: 600; }
    .hero__visual { display: flex; justify-content: center; align-items: center; }

    /* ── Prediction Card ── */
    .pred-card { width: min(380px, 100%); border-radius: var(--radius-lg); padding: 28px; position: relative; }
    .pred-card__header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .pred-card__label { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--color-text-muted); }
    .pred-card__live { display: flex; align-items: center; gap: 6px; font-size: 0.7rem; font-weight: 700; color: var(--color-accent); letter-spacing: 0.08em; }
    .pred-card__live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--color-accent); animation: pulse 1.5s infinite; }
    .pred-card__match { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 28px; }
    .pred-card__team { display: flex; flex-direction: column; align-items: center; gap: 10px; flex: 1; }
    .pred-card__badge { width: 60px; height: 60px; border-radius: 50%; display: grid; place-items: center; font-size: 1.6rem; }
    .pred-card__team-name { font-size: 0.82rem; font-weight: 700; letter-spacing: 0.02em; }
    .pred-card__vs { font-size: 0.9rem; font-weight: 800; color: var(--color-text-muted); letter-spacing: 0.05em; }
    .pred-card__probs { margin-bottom: 20px; }
    .pred-card__prob-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
    .pred-card__prob-label { font-size: 0.72rem; font-weight: 600; color: var(--color-text-secondary); width: 36px; flex-shrink: 0; }
    .pred-card__prob-bar { flex: 1; height: 6px; background: rgba(255,255,255,0.06); border-radius: 999px; overflow: hidden; }
    .pred-card__prob-fill { height: 100%; border-radius: 999px; transition: width 1s var(--ease); }
    .pred-card__prob-fill--home { width: 62%; background: var(--color-accent); }
    .pred-card__prob-fill--draw { width: 20%; background: rgba(255,255,255,0.3); }
    .pred-card__prob-fill--away { width: 18%; background: #0070ff; }
    .pred-card__prob-pct { font-size: 0.72rem; font-weight: 700; color: var(--color-text-primary); width: 30px; text-align: right; flex-shrink: 0; }
    .pred-card__confidence { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: var(--color-accent-dim); border: 1px solid rgba(0,229,160,0.18); border-radius: var(--radius-sm); }
    .pred-card__conf-label { font-size: 0.72rem; font-weight: 600; color: var(--color-text-secondary); letter-spacing: 0.06em; text-transform: uppercase; }
    .pred-card__conf-value { font-size: 1rem; font-weight: 800; color: var(--color-accent); }
    .hero__orbit {
      position: absolute; border: 1px dashed rgba(0,229,160,0.12); border-radius: 50%;
      top: 50%; left: 50%; transform: translate(-50%,-50%); pointer-events: none;
      animation: spin 30s linear infinite;
    }
    @keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }

    /* ── Stats Band ── */
    .stats { border-top: 1px solid var(--color-border); border-bottom: 1px solid var(--color-border); padding-block: 3rem; }
    .stats__grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 0; }
    .stats__item { text-align: center; padding: 1.5rem; border-right: 1px solid var(--color-border); transition: background var(--duration); }
    .stats__item:last-child { border-right: none; }
    .stats__item:hover { background: rgba(255,255,255,0.02); }
    .stats__num { font-size: clamp(2rem, 3.5vw, 2.8rem); font-weight: 900; letter-spacing: -0.04em; line-height: 1; color: var(--color-accent); margin-bottom: 6px; }
    .stats__label { font-size: 0.78rem; font-weight: 500; color: var(--color-text-secondary); letter-spacing: 0.04em; text-transform: uppercase; }

    /* ── Section helpers ── */
    .section__eyebrow { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--color-accent); margin-bottom: 12px; }
    .section__heading { font-size: clamp(1.8rem, 3.5vw, 2.8rem); font-weight: 800; letter-spacing: -0.03em; line-height: 1.15; margin-bottom: 1rem; }
    .section__sub { font-size: 1rem; color: var(--color-text-secondary); max-width: 52ch; line-height: 1.7; margin-bottom: 3.5rem; }

    /* ── Features ── */
    .features { padding-block: var(--section-pad); }
    .features__grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 20px; }
    .feat-card { padding: 32px 28px; border-radius: var(--radius-md); transition: transform var(--duration) var(--ease), border-color var(--duration), background var(--duration); cursor: default; }
    .feat-card:hover { transform: translateY(-5px); border-color: rgba(0,229,160,0.25); background: rgba(255,255,255,0.06); }
    .feat-card__icon { width: 50px; height: 50px; border-radius: var(--radius-sm); background: var(--color-accent-dim); border: 1px solid rgba(0,229,160,0.2); display: grid; place-items: center; font-size: 1.4rem; margin-bottom: 20px; }
    .feat-card__title { font-size: 1rem; font-weight: 700; margin-bottom: 10px; letter-spacing: -0.01em; }
    .feat-card__body { font-size: 0.85rem; color: var(--color-text-secondary); line-height: 1.75; }

    /* ── How It Works ── */
    .howitworks { padding-block: var(--section-pad); border-top: 1px solid var(--color-border); }
    .steps__grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 0; position: relative; }
    .steps__grid::before { content:''; position:absolute; top:28px; left:16.66%; right:16.66%; height:1px; background:linear-gradient(90deg,var(--color-accent),transparent); }
    .step { padding: 0 28px; position: relative; }
    .step__num { width: 56px; height: 56px; border-radius: 50%; background: var(--color-surface); border: 1px solid var(--color-border); display: grid; place-items: center; font-size: 1.1rem; font-weight: 900; color: var(--color-accent); margin-bottom: 24px; position: relative; z-index: 1; }
    .step__title { font-size: 1rem; font-weight: 700; margin-bottom: 10px; }
    .step__body { font-size: 0.84rem; color: var(--color-text-secondary); line-height: 1.75; }

    /* ── Leagues ── */
    .leagues { padding-block: var(--section-pad); border-top: 1px solid var(--color-border); }
    .leagues__scroll { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 2.5rem; }
    .league-pill { display: inline-flex; align-items: center; gap: 10px; padding: 12px 20px; border-radius: 999px; font-size: 0.82rem; font-weight: 600; letter-spacing: 0.02em; transition: border-color var(--duration), background var(--duration), color var(--duration), transform var(--duration); cursor: pointer; }
    .league-pill:hover { border-color: var(--color-accent); background: var(--color-accent-dim); color: var(--color-accent); transform: translateY(-2px); }
    .league-pill span { font-size: 1.1rem; }

    /* ── CTA Banner ── */
    .cta-banner { padding-block: var(--section-pad); border-top: 1px solid var(--color-border); }
    .cta-banner__inner { border-radius: var(--radius-lg); padding: clamp(2.5rem,5vw,4.5rem) clamp(2rem,5vw,5rem); text-align: center; position: relative; overflow: hidden; background: linear-gradient(135deg, rgba(0,229,160,0.08) 0%, rgba(0,112,255,0.06) 100%); border: 1px solid rgba(0,229,160,0.15); }
    .cta-banner__inner::before { content:''; position:absolute; width:400px;height:400px;border-radius:50%;top:-180px;right:-100px;background:radial-gradient(circle,rgba(0,229,160,0.14) 0%,transparent 70%);filter:blur(60px); }
    .cta-banner__eyebrow { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--color-accent); margin-bottom: 14px; }
    .cta-banner__heading { font-size: clamp(1.8rem,3vw,2.6rem); font-weight: 900; letter-spacing: -0.03em; margin-bottom: 14px; }
    .cta-banner__sub { font-size: 0.95rem; color: var(--color-text-secondary); max-width: 50ch; margin: 0 auto 2.2rem; line-height: 1.7; }
    .cta-banner__actions { display: flex; justify-content: center; gap: 14px; flex-wrap: wrap; }

    /* ── Footer ── */
    .footer { padding-block: 2.5rem; border-top: 1px solid var(--color-border); }
    .footer__inner { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
    .footer__copy { font-size: 0.78rem; color: var(--color-text-muted); }
    .footer__links { display: flex; gap: 1.4rem; }
    .footer__links a { font-size: 0.78rem; color: var(--color-text-muted); transition: color var(--duration); }
    .footer__links a:hover { color: var(--color-accent); }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      .nav__links, .nav__cta .btn-ghost { display: none; }
      .nav__hamburger { display: flex; }
      .hero__grid { grid-template-columns: 1fr; text-align: center; gap: 3rem; }
      .hero__badge, .hero__actions, .hero__social-proof { justify-content: center; }
      .hero__sub { margin-inline: auto; }
      .hero__visual { order: -1; }
      .hero__orbit { display: none; }
      .stats__grid { grid-template-columns: repeat(2,1fr); }
      .stats__item:nth-child(2) { border-right: none; }
      .stats__item:nth-child(3) { border-top: 1px solid var(--color-border); }
      .features__grid { grid-template-columns: 1fr; }
      .steps__grid { grid-template-columns: 1fr; gap: 2.5rem; }
      .steps__grid::before { display: none; }
      .step { padding: 0; }
    }
    @media (max-width: 480px) {
      .pred-card { padding: 20px; }
      .cta-banner__actions { flex-direction: column; align-items: center; }
      .footer__inner { flex-direction: column; text-align: center; }
    }
  </style>
</head>
<body>

  <!-- React mounts here -->
  <div id="root"></div>

  <!-- ============================================================
       REACT APPLICATION
       All UI is built as React components below.
       type="text/babel" tells Babel to transpile JSX on the fly.
       ============================================================ -->
  <script type="text/babel">

    // ── React hooks destructured from global React object ────────
    const { useState } = React;

    // ================================================================
    // COMPONENT: NavBar
    // Props: none
    // ================================================================
    function NavBar() {
      return (
        <nav className="nav">
          <div className="container nav__inner">

            {/* Logo */}
            <a href="index.html" className="nav__logo">
              <div className="nav__logo-icon">⚽</div>
              Predict<span className="accent">FC</span>
            </a>

            {/* Desktop navigation links — add/remove <a> tags here */}
            <ul className="nav__links">
              <li><a href="#features">Features</a></li>
              <li><a href="#how-it-works">How It Works</a></li>
              <li><a href="#leagues">Leagues</a></li>
              <li><a href="#">Pricing</a></li>
            </ul>

            {/* CTA buttons */}
            <div className="nav__cta">
              <a href="login.html" className="btn-ghost">Log In</a>
              <a href="login.html" className="btn-primary">Get Started</a>
            </div>

            {/* Mobile hamburger */}
            <div className="nav__hamburger" aria-label="Menu">
              <span /><span /><span />
            </div>
          </div>
        </nav>
      );
    }

    // ================================================================
    // COMPONENT: PredictionCard
    // Renders the animated match prediction widget in the hero.
    // Props:
    //   homeTeam  {name, emoji, bgColor}
    //   awayTeam  {name, emoji, bgColor}
    //   probs     {home, draw, away}   — numbers 0-100
    //   confidence — string e.g. "87.4%"
    // ================================================================
    function PredictionCard({ homeTeam, awayTeam, probs, confidence }) {
      return (
        <div className="pred-card glass">
          {/* Header row */}
          <div className="pred-card__header">
            <span className="pred-card__label">Match Prediction</span>
            <span className="pred-card__live">
              <span className="pred-card__live-dot" />
              LIVE ANALYSIS
            </span>
          </div>

          {/* Teams */}
          <div className="pred-card__match">
            <div className="pred-card__team">
              <div className="pred-card__badge" style={{ background: homeTeam.bgColor }}>
                {homeTeam.emoji}
              </div>
              <span className="pred-card__team-name">{homeTeam.name}</span>
            </div>
            <span className="pred-card__vs">VS</span>
            <div className="pred-card__team">
              <div className="pred-card__badge" style={{ background: awayTeam.bgColor }}>
                {awayTeam.emoji}
              </div>
              <span className="pred-card__team-name">{awayTeam.name}</span>
            </div>
          </div>

          {/* Probability bars */}
          <div className="pred-card__probs">
            {[
              { label: 'Home', fillClass: 'pred-card__prob-fill--home', pct: probs.home },
              { label: 'Draw', fillClass: 'pred-card__prob-fill--draw', pct: probs.draw },
              { label: 'Away', fillClass: 'pred-card__prob-fill--away', pct: probs.away },
            ].map(row => (
              <div className="pred-card__prob-row" key={row.label}>
                <span className="pred-card__prob-label">{row.label}</span>
                <div className="pred-card__prob-bar">
                  <div className={`pred-card__prob-fill ${row.fillClass}`} />
                </div>
                <span className="pred-card__prob-pct">{row.pct}%</span>
              </div>
            ))}
          </div>

          {/* Confidence score */}
          <div className="pred-card__confidence">
            <span className="pred-card__conf-label">AI Confidence Score</span>
            <span className="pred-card__conf-value">{confidence}</span>
          </div>
        </div>
      );
    }

    // ================================================================
    // COMPONENT: HeroSection
    // ================================================================
    function HeroSection() {
      // Edit match data here — passed as props to PredictionCard
      const matchData = {
        homeTeam: { name: 'Arsenal',  emoji: '🦁', bgColor: 'rgba(255,0,60,0.15)' },
        awayTeam: { name: 'Chelsea',  emoji: '🦅', bgColor: 'rgba(0,112,255,0.15)' },
        probs:    { home: 62, draw: 20, away: 18 },
        confidence: '87.4%',
      };

      return (
        <section className="hero">
          <div className="container hero__grid">

            {/* Left — copy */}
            <div className="hero__content">
              <div className="hero__badge">
                <span className="hero__badge-dot" />
                AI-Powered Predictions — Season 2024/25
              </div>

              <h1 className="hero__heading">
                Predict Every<br />

      return (
        <section className="stats">

            <div className="stats__grid">
              {stats.map(s => (
                <div className="stats__item" key={s.label}>

                </div>
              ))}
            </div>
          </div>
        </section>
      );
    }

    // COMPONENT: FeatureCard
    // Props: icon, title, body
    // ================================================================
    function FeatureCard({ icon, title, body }) {
      return (
        <div className="feat-card glass">
          <div className="feat-card__icon">{icon}</div>
          <h3 className="feat-card__title">{title}</h3>
          <p className="feat-card__body">{body}</p>
